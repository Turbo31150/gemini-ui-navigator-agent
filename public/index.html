<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigator — AI Web Browser Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1a1a3a;
            background: #0d0d22;
        }
        .header h1 {
            font-size: 22px;
            color: #a78bfa;
            letter-spacing: 2px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .status {
            font-size: 13px;
            color: #666;
            padding: 4px 12px;
            border-radius: 12px;
            background: #111128;
        }
        .status.connected { color: #00ff88; background: #0a2a1a; }
        .status.error { color: #ff4444; background: #2a0a0a; }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Browser view panel */
        .browser-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1a1a3a;
        }
        .url-bar {
            padding: 8px 16px;
            background: #111128;
            border-bottom: 1px solid #1a1a3a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .url-bar .nav-btn {
            background: #1a1a3a;
            border: none;
            color: #888;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .url-bar .nav-btn:hover { background: #2a2a4a; color: #fff; }
        .url-bar .url-display {
            flex: 1;
            padding: 6px 12px;
            background: #0a0a1a;
            border: 1px solid #1a1a3a;
            border-radius: 8px;
            color: #888;
            font-size: 13px;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .browser-view {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #080818;
            position: relative;
        }
        .browser-view img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .browser-view .placeholder {
            color: #333;
            font-size: 18px;
        }
        /* Action indicator overlay */
        .action-indicator {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 3px solid #a78bfa;
            background: rgba(167,139,250,0.3);
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: clickPulse 0.6s ease-out forwards;
            display: none;
        }
        @keyframes clickPulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        /* Side panel */
        .side-panel {
            width: 360px;
            display: flex;
            flex-direction: column;
            background: #0d0d20;
        }

        /* Mic + controls */
        .controls {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            border-bottom: 1px solid #1a1a3a;
        }
        .mic-button {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid #1a1a3a;
            background: #111128;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .mic-button:hover { border-color: #a78bfa; }
        .mic-button.active {
            border-color: #a78bfa;
            background: #1a1040;
            animation: pulse 2s infinite;
        }
        .mic-button svg { width: 28px; height: 28px; fill: #666; }
        .mic-button.active svg { fill: #a78bfa; }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(167,139,250,0.3); }
            50% { box-shadow: 0 0 0 14px rgba(167,139,250,0); }
        }

        /* Transcript */
        .transcript {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 12px;
        }
        .msg {
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 90%;
            font-size: 13px;
            line-height: 1.5;
        }
        .msg.user {
            align-self: flex-end;
            background: #1a2040;
            color: #8cacff;
        }
        .msg.agent {
            align-self: flex-start;
            background: #201a40;
            color: #c4a8ff;
        }
        .msg.tool {
            align-self: flex-start;
            background: #2a2a1a;
            color: #ffdd88;
            font-size: 11px;
            font-family: monospace;
        }

        /* Tools badges */
        .tools-info {
            padding: 8px 12px;
            border-top: 1px solid #1a1a3a;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .tool-badge {
            padding: 3px 8px;
            border-radius: 10px;
            background: #1a1a3a;
            color: #a78bfa;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>NAVIGATOR</h1>
        <div class="header-right">
            <span class="status" id="status">Click mic to start</span>
        </div>
    </div>

    <div class="main">
        <div class="browser-panel">
            <div class="url-bar">
                <button class="nav-btn" title="Back">&#8592;</button>
                <button class="nav-btn" title="Forward">&#8594;</button>
                <div class="url-display" id="urlBar">https://www.google.com</div>
            </div>
            <div class="browser-view" id="browserView">
                <span class="placeholder">Browser view will appear here</span>
                <img id="screenImg" style="display:none" />
                <div class="action-indicator" id="actionDot"></div>
            </div>
        </div>

        <div class="side-panel">
            <div class="controls">
                <button class="mic-button" id="micBtn" onclick="toggleSession()">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>
            </div>

            <div class="transcript" id="transcript"></div>

            <div class="tools-info">
                <span class="tool-badge">Click</span>
                <span class="tool-badge">Type</span>
                <span class="tool-badge">Scroll</span>
                <span class="tool-badge">Navigate</span>
                <span class="tool-badge">Read Page</span>
                <span class="tool-badge">Go Back</span>
                <span class="tool-badge">Key Press</span>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let audioContext = null;
        let mediaStream = null;
        let isActive = false;

        const statusEl = document.getElementById('status');
        const micBtn = document.getElementById('micBtn');
        const transcriptEl = document.getElementById('transcript');
        const screenImg = document.getElementById('screenImg');
        const browserView = document.getElementById('browserView');
        const urlBar = document.getElementById('urlBar');
        const actionDot = document.getElementById('actionDot');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.textContent = text;
            transcriptEl.appendChild(div);
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }

        function showClickIndicator(x, y) {
            // x, y in 0-1000 grid — map to browser view
            const rect = screenImg.getBoundingClientRect();
            const px = rect.left + (x / 1000) * rect.width;
            const py = rect.top + (y / 1000) * rect.height;
            actionDot.style.left = px + 'px';
            actionDot.style.top = py + 'px';
            actionDot.style.display = 'block';
            actionDot.style.animation = 'none';
            actionDot.offsetHeight; // reflow
            actionDot.style.animation = 'clickPulse 0.6s ease-out forwards';
            setTimeout(() => { actionDot.style.display = 'none'; }, 600);
        }

        async function toggleSession() {
            if (isActive) { stopSession(); }
            else { await startSession(); }
        }

        async function startSession() {
            try {
                statusEl.textContent = 'Connecting...';
                statusEl.className = 'status';

                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${location.host}/ws`);
                ws.binaryType = 'arraybuffer';

                ws.onopen = async () => {
                    statusEl.textContent = 'Connected — Speak to navigate';
                    statusEl.className = 'status connected';
                    micBtn.classList.add('active');
                    isActive = true;
                    await startMicrophone();
                };

                ws.onmessage = (event) => {
                    if (event.data instanceof ArrayBuffer) {
                        playAudio(event.data);
                    } else {
                        handleEvent(JSON.parse(event.data));
                    }
                };

                ws.onclose = () => {
                    stopSession();
                    statusEl.textContent = 'Disconnected';
                    statusEl.className = 'status';
                };

                ws.onerror = () => {
                    statusEl.textContent = 'Connection error';
                    statusEl.className = 'status error';
                };
            } catch (e) {
                statusEl.textContent = `Error: ${e.message}`;
                statusEl.className = 'status error';
            }
        }

        function handleEvent(data) {
            switch (data.type) {
                case 'screenshot':
                    // Update browser view with new screenshot
                    screenImg.src = 'data:image/jpeg;base64,' + data.data;
                    screenImg.style.display = 'block';
                    browserView.querySelector('.placeholder')?.remove();
                    break;
                case 'input_transcription':
                    addMessage(data.text, 'user');
                    break;
                case 'output_transcription':
                    addMessage(data.text, 'agent');
                    break;
                case 'tool_call':
                    addMessage(`${data.name}(${JSON.stringify(data.args).substring(0, 80)})`, 'tool');
                    // Show click indicator for click actions
                    if (data.name === 'click_element' && data.args.x !== undefined) {
                        showClickIndicator(data.args.x, data.args.y);
                    }
                    break;
                case 'tool_result':
                    if (data.result?.url) {
                        urlBar.textContent = data.result.url;
                    }
                    if (data.result?.title) {
                        urlBar.textContent = data.result.url || urlBar.textContent;
                    }
                    const preview = JSON.stringify(data.result).substring(0, 100);
                    addMessage(`${data.name}: ${preview}`, 'tool');
                    break;
                case 'interrupted':
                    break;
                case 'session_ended':
                    addMessage(`Session ended: ${data.reason}`, 'tool');
                    stopSession();
                    break;
            }
        }

        async function startMicrophone() {
            audioContext = new AudioContext({ sampleRate: 16000 });
            mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    sampleRate: 16000,
                    channelCount: 1,
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                }
            });

            const source = audioContext.createMediaStreamSource(mediaStream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);
            processor.onaudioprocess = (e) => {
                if (!isActive || !ws || ws.readyState !== WebSocket.OPEN) return;
                const float32 = e.inputBuffer.getChannelData(0);
                const int16 = new Int16Array(float32.length);
                for (let i = 0; i < float32.length; i++) {
                    int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32767));
                }
                ws.send(int16.buffer);
            };

            source.connect(processor);
            processor.connect(audioContext.destination);
        }

        function playAudio(pcmData) {
            if (!audioContext) return;
            const int16 = new Int16Array(pcmData);
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) {
                float32[i] = int16[i] / 32768;
            }
            const playbackCtx = new AudioContext({ sampleRate: 24000 });
            const buffer = playbackCtx.createBuffer(1, float32.length, 24000);
            buffer.getChannelData(0).set(float32);
            const source = playbackCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(playbackCtx.destination);
            source.start();
        }

        function stopSession() {
            isActive = false;
            micBtn.classList.remove('active');
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'stop' }));
                ws.close();
            }
            ws = null;
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            statusEl.textContent = 'Click mic to start';
            statusEl.className = 'status';
        }
    </script>
</body>
</html>
